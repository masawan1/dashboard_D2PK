<script>
    function showSection(sectionId) {
        // 1. Daftar semua section yang ada di main content
        const sections = ['dashboard-content', 'materi-content', 'games-content'];
        
        // 2. Sembunyikan semua section
        sections.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.classList.add('hidden');
        });

        // 3. Tampilkan section yang dipilih
        const activeSection = document.getElementById(sectionId + '-content');
        if(activeSection) activeSection.classList.remove('hidden');

        // 4. Update tampilan menu (Active State)
        document.querySelectorAll('.sidebar-link').forEach(link => {
            link.classList.remove('sidebar-active', 'text-blue-900');
            link.classList.add('text-gray-400');
        });
        document.getElementById('link-' + sectionId).classList.add('sidebar-active');
        document.getElementById('link-' + sectionId).classList.remove('text-gray-400');
    }
</script>
